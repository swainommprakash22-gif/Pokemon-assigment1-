<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pikachu Layout</title>

  <link rel="stylesheet" href="Mon.css">
</head>
<body>

<div class="container">

    <div class="left">
        <!-- For Logo -->
        <img src="logo2.png" class="logo">

        <h4>POKEMON GEN I</h4>

        <h1>Pikachu</h1>

        <p>
            Pikachu is an Electric-type Pokémon introduced
            in Generation I. Pikachu are small, chubby,
            and incredibly cute mouse-like Pokémon.
            They are almost completely covered by
            yellow fur.
        </p>

        <div class="count">
            <div class="line"></div>
            <span>01 / 08</span>
        </div>

     <!-- For ball-->
        <img src="Ball.png" class="ball">

    </div>

    <div class="right">

        <div class="menu">
            <span></span>
            <span></span>
            <span></span>
        </div>

    </div>

    <div class="dot">
        <ul>
            <li class="black"></li>
            <li class="white"></li>
            <li class="white"></li>
            <li class="white"></li>
            <li class="white"></li>

        </ul>
    </div>

    <!-- For Pikachu image -->
    <img src="Pikachu.png" class="pikachu">

</div>

</body>
</html>
